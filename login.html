<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4" style="max-width:400px; width:100%;">
        <h2 class="text-center fw-bold mb-3">Welcome Back</h2>
        <p class="text-center text-muted mb-4">Login to your account</p>

        <form>
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control mb-3" placeholder="Enter your email">

            <label class="form-label">Password</label>
            <input type="password" class="form-control mb-2" placeholder="Enter your password">

            <div class="text-end mb-3">
                <a href="forgot-password.html" class="small">Forgot Password?</a>
            </div>

            <a href="dashboard.html" class="btn btn-primary w-100 py-2">Login</a>
        </form>

        <p class="text-center mt-4 mb-0">
            Don't have an account?
            <a href="register.html" class="fw-semibold">Sign up</a>
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
