<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="card shadow-lg p-4" style="max-width:400px; width:100%;">

        <h2 class="text-center fw-bold mb-3">Create Account</h2>
        <p class="text-center text-muted mb-4">Sign up to get started</p>

        <form>
            <label class="form-label">Full Name</label>
            <input class="form-control mb-3" placeholder="Enter your full name">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control mb-3" placeholder="Enter your email">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control mb-3" placeholder="Enter your phone number">
            <label class="form-label">Password</label>
            <input type="password" class="form-control mb-3" placeholder="Enter your password">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control mb-3" placeholder="Enter your password again">

            <a href="login.html" class="btn btn-success w-100 py-2">Register</a>
        </form>

        <p class="text-center mt-4 mb-0">
            Already have an account?
            <a href="login.html" class="fw-semibold">Login</a>
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
