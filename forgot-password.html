<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4" style="max-width:400px; width:100%;">
        <h2 class="text-center fw-bold mb-3">Forgot Password</h2>
        <p class="text-center text-muted mb-4">Enter your email to reset password</p>

        <form>
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control mb-3" placeholder="Enter your email">

            <a href="reset-password.html" class="btn btn-warning w-100 py-2">Reset Password</a>
        </form>

        <p class="text-center mt-4 mb-0">
            <a href="login.html">Back to Login</a>
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
